// ============================================================
//  PétasseGang Addons — build.gradle
//  Forge ${forge_version} for Minecraft ${minecraft_version}
// ============================================================

plugins {
    id 'net.minecraftforge.gradle' version '[7.0,8.0)'
    id 'java-library'
}

// ── Project metadata ─────────────────────────────────────────
version        = mod_version
group          = mod_group
base.archivesName = mod_id

// ── Java toolchain ───────────────────────────────────────────
java {
    toolchain.languageVersion = JavaLanguageVersion.of(java_version as int)
    withSourcesJar()
    withJavadocJar()
}

// ── Minecraft / ForgeGradle configuration ────────────────────
minecraft {
    // Forge version for MC 26.1 (FG7 declares it here, not in dependencies)
    version = "${minecraft_version}-${forge_version}"

    // MC 26.1 ships fully deobfuscated — official mappings required
    mappings channel: 'official', version: minecraft_version

    runs {
        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            systemProperty 'forge.logging.console.level', 'debug'
        }

        // ---- Client ----------------------------------------
        client {
            workingDir = project.file('run')
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
            mods {
                "${mod_id}" { source sourceSets.main }
            }
        }

        // ---- Server ----------------------------------------
        server {
            workingDir = project.file('run/server')
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
            mods {
                "${mod_id}" { source sourceSets.main }
            }
        }

        // ---- Game Test Server (in-game tests) ---------------
        gameTestServer {
            workingDir = project.file('run/gametest')
            systemProperty 'forge.enabledGameTestNamespaces', mod_id
            mods {
                "${mod_id}" {
                    source sourceSets.main
                    source sourceSets.test
                }
            }
        }

        // ---- Data generation --------------------------------
        data {
            workingDir = project.file('run/data')
            args = ['--mod', mod_id, '--all',
                    '--output', file('src/generated/resources/').absolutePath,
                    '--existing', file('src/main/resources/').absolutePath]
            mods {
                "${mod_id}" { source sourceSets.main }
            }
        }
    }
}

// ── Source sets ──────────────────────────────────────────────
sourceSets {
    main {
        resources.srcDirs = ['src/main/resources', 'src/generated/resources']
    }
    test {
        java.srcDirs   = ['src/test/java']
        resources.srcDirs = ['src/test/resources']
    }
}

// ── Repositories ─────────────────────────────────────────────
repositories {
    mavenCentral()
    maven {
        name = 'MinecraftForge'
        url  = 'https://maven.minecraftforge.net'
    }
}

// ── Dependencies ─────────────────────────────────────────────
dependencies {
    // ============================================================
    // DÉPENDANCES EXTERNES — Ajoutez vos librairies ici
    // ============================================================
    //
    // Mod Forge (doit être deobfusqué avec fg.deobf) :
    //   implementation fg.deobf("curse.maven:mod-slug-FILEID:FILEID")
    //   compileOnly fg.deobf("mezz.jei:jei-${minecraft_version}-forge:VERSION:api")
    //   runtimeOnly fg.deobf("mezz.jei:jei-${minecraft_version}-forge:VERSION")
    //
    // Librairie Java classique (Maven Central) :
    //   implementation "com.google.code.gson:gson:2.11.0"
    //   implementation "org.apache.commons:commons-lang3:3.14.0"
    //
    // Librairie embarquée dans le JAR final (JarJar) :
    //   jarJar(group: "com.example", name: "lib", version: "[1.0,2.0)")
    //
    // API compile-only (pas présente au runtime joueur) :
    //   compileOnly "some.api:api:1.0"
    //
    // Dépendances populaires commentées prêtes à décommenter :
    //   compileOnly fg.deobf("software.bernie.geckolib:geckolib-forge-${minecraft_version}:VERSION")       // GeckoLib (mobs animés)
    //   compileOnly fg.deobf("top.theillusivec4.curios:curios-forge:VERSION:api")                         // Curios (slots custom)
    //   runtimeOnly fg.deobf("top.theillusivec4.curios:curios-forge:VERSION")
    //   compileOnly fg.deobf("vazkii.patchouli:Patchouli:${minecraft_version}-VERSION:api")               // Patchouli (livres in-game)
    // ============================================================

    // ---- Tests (JUnit 5) -----------------------------------
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.3'
    testImplementation 'org.junit.jupiter:junit-jupiter-params:5.10.3'
    testRuntimeOnly    'org.junit.jupiter:junit-jupiter-engine:5.10.3'
    testRuntimeOnly    'org.junit.platform:junit-platform-launcher:1.10.3'
}

// ── Test configuration ───────────────────────────────────────
test {
    useJUnitPlatform()
    maxHeapSize = '1G'
    testLogging {
        events 'passed', 'failed', 'skipped'
        showStandardStreams = false
    }
    reports {
        html.required = true
        junitXml.required = true
    }
}

// ── JAR manifest ─────────────────────────────────────────────
jar {
    manifest {
        attributes([
            'Specification-Title'     : mod_name,
            'Specification-Vendor'    : mod_authors,
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.name,
            'Implementation-Version'  : project.version,
            'Implementation-Vendor'   : mod_authors,
            'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

// Token substitution in mods.toml
processResources {
    def props = [
        mod_id               : mod_id,
        mod_name             : mod_name,
        mod_version          : mod_version,
        mod_authors          : mod_authors,
        mod_description      : mod_description,
        forge_version        : forge_version,
        loader_version_range : loader_version_range,
        minecraft_version    : minecraft_version,
        minecraft_version_range: minecraft_version_range,
    ]
    inputs.properties props
    filesMatching('META-INF/mods.toml') { expand props }
    filesMatching('pack.mcmeta')        { expand props }
}

// ── Compilation options ──────────────────────────────────────
compileJava {
    options.encoding   = 'UTF-8'
    // -Xlint:all enables all warnings; -Xlint:-processing suppresses annotation processing noise.
    // NOTE: -Werror is intentionally omitted — Forge's generated code can produce warnings
    // that would break the build. Treat warnings as signals, not blockers.
    options.compilerArgs += ['-Xlint:all', '-Xlint:-processing', '-Xlint:-serial']
}

// ── VS Code run configs ──────────────────────────────────────
// Run: ./gradlew genEclipseRuns
