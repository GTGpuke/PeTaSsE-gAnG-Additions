modLoader   = "javafml"
loaderVersion = "${loader_version_range}"
license     = "MIT"

[[mods]]
    modId       = "${mod_id}"
    version     = "${mod_version}"
    displayName = "PeTaSsE_gAnG_Additions"
    description = '''${mod_description}'''

    # URL shown in the mods screen — update once you have a GitHub repo URL
    # displayURL = "https://github.com/PetasseGang/petassegang_addons"

    # Path to a 256x256 logo inside the JAR (optional)
    # logoFile = "petassegang_addons.png"

    authors  = "${mod_authors}"
    credits  = "La PétasseGang crew"

[[dependencies.${mod_id}]]
    modId        = "forge"
    mandatory    = true
    versionRange = "${loader_version_range}"
    ordering     = "NONE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "minecraft"
    mandatory    = true
    versionRange = "${minecraft_version_range}"
    ordering     = "NONE"
    side         = "BOTH"

# ── Dépendances embarquées (JiJ) ──────────────────────────────
# Déclarées en mandatory=false tant qu'aucune version MC 26.1 n'est disponible.
# Passer à mandatory=true + décommenter les entrées build.gradle dès qu'une
# release compatible est publiée.

[[dependencies.${mod_id}]]
    modId        = "geckolib"
    mandatory    = false
    versionRange = "[4.4,5.0)"
    ordering     = "BEFORE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "patchouli"
    mandatory    = false
    versionRange = "[1.0-SNAPSHOT,2.0)"
    ordering     = "BEFORE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "konkrete"
    mandatory    = false
    versionRange = "[1.6,2.0)"
    ordering     = "BEFORE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "fancymenu"
    mandatory    = false
    versionRange = "[3.2,4.0)"
    ordering     = "BEFORE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "fusion"
    mandatory    = false
    versionRange = "[1.1,2.0)"
    ordering     = "BEFORE"
    side         = "BOTH"

# ── Dépendances optionnelles (soft-dep) ───────────────────────

[[dependencies.${mod_id}]]
    modId        = "imm_ptl_core"
    mandatory    = false
    versionRange = "*"
    ordering     = "NONE"
    side         = "BOTH"

[[dependencies.${mod_id}]]
    modId        = "oculus"
    mandatory    = false
    versionRange = "*"
    ordering     = "NONE"
    side         = "BOTH"
